<!DOCTYPE html>
<html lang="en" data-theme="light" data-font="serif">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lewk — minimal editorial CSS framework</title>
  <meta name="description" content="A minimal editorial CSS framework. One foreground + one background + one accent per theme; everything else derives.">
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo=">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/lewk.css">
</head>
<body>

<nav class="nav">
  <a class="brand" href="/">lewk</a>
  <a href="#typography">Type</a>
  <a href="#layouts">Layouts</a>
  <a href="#splits">Splits</a>
  <a href="#components">Components</a>
  <a href="#blocks">Blocks</a>
  <a href="#patterns">Patterns</a>
  <a href="#themes">Themes</a>
  <a href="/examples">Examples</a>
  <a href="https://github.com/nimdaghlian/lewk">GitHub</a>
</nav>

<main class="page wide">

<section class="section">

    <h3 style="margin-top: var(--sp-5)">Examples</h3>
    <p class="muted">Different page layouts with combos of components </p>

    <div class="rails rails-3" style="margin-top: var(--sp-3); border-top: var(--rule); padding-top: var(--sp-4)">
      <div>
        <div class="meta">Sidebar with breadcrumbs and main section</div>
        <p style="margin-top: var(--sp-2)"><a href="sidebar-layout.html">Sidebar</a></p>
      </div>
      <div>
        <div class="meta">Rails with different column counts</div>
        <p style="margin-top: var(--sp-2)"><a href="rails-grid.html">Rails</a></p>
      </div>
    </div>

</section>

</main>

<footer class="footer">
  <span>lewk — MIT license</span>
  <span class="meta">v1</span>
</footer>

<div class="themer" role="group" aria-label="Theme and font">
  <div class="themer-group">
    <button data-theme-set="light"     title="light"     style="background:#fff;border-color:#111"></button>
    <button data-theme-set="paper"     title="paper"     style="background:#f4ecdc;border-color:#2a2418"></button>
    <button data-theme-set="hot"       title="hot"       style="background:#fff8f0;border-color:#a8092b"></button>
    <button data-theme-set="moss"      title="moss"      style="background:#d8dcc4;border-color:#1b2618"></button>
    <button data-theme-set="ocean"     title="ocean"     style="background:#0c2436;border-color:#5acab1"></button>
    <button data-theme-set="dark"      title="dark"      style="background:#111;border-color:#ff8a14"></button>
    <button data-theme-set="noir"      title="noir"      style="background:#0a0a0a;border-color:#d31138"></button>
    <button data-theme-set="lagoon"    title="lagoon"    style="background:#226985;border-color:#fdf4b6"></button>
    <button data-theme-set="iris"      title="iris"      style="background:#c2e88e;border-color:#4e0e6c"></button>
    <button data-theme-set="lemon"     title="lemon"     style="background:#fff700;border-color:#1a1a00"></button>
    <button data-theme-set="blueprint" title="blueprint" style="background:#001a4d;border-color:#e6f0ff"></button>
    <button data-theme-set="rose"      title="rose"      style="background:#ffd5e0;border-color:#2a0814"></button>
    <button data-theme-set="newsprint" title="newsprint" style="background:#e8e6dc;border-color:#1a1a1a"></button>
  </div>
  <div class="themer-divider"></div>
  <div class="themer-group">
    <button data-font-set="serif" title="serif" style="font-family: Lora, serif">Aa</button>
    <button data-font-set="sans"  title="sans"  style="font-family: Inter, sans-serif; font-weight: 500">Aa</button>
    <button data-font-set="block" title="block" style="font-family: 'Space Grotesk', sans-serif; font-weight: 700">Aa</button>
    <button data-font-set="mono"  title="mono"  style="font-family: ui-monospace, monospace">Aa</button>
    <button data-font-set="pixel" title="pixel" style="font-family: VT323, monospace; font-size: 16px">Aa</button>
  </div>
</div>

<script src="./themer.js"></script>

</body>
</html>
